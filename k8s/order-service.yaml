apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: <ECR_REPO_URL_ORDER>:latest
        ports:
        - containerPort: 3003
        env:
        - name: DATABASE_URL
          value: "postgresql://msuser:mspassword123@<RDS_ENDPOINT>:5432/msdb?schema=order"
        - name: PRODUCT_SERVICE_URL
          value: "http://product-service:3002"
        - name: REDIS_URL
          value: "redis://redis-cluster:6379"
        readinessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 10
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  ports:
    - protocol: TCP
      port: 3003
      targetPort: 3003
  type: ClusterIP
